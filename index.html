    <!-- Structured data: brand + site search. Per-page SportsEvent JSON-LD is injected at
         runtime on event pages (see src/lib/seo.ts). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "name": "Silbo Sports",
            "url": "https://silbosports.com/",
            "description": "A multi-sport personal schedule: follow what you love, in your local time, synced to your calendar."
          },
          {
            "@type": "WebSite",
            "name": "Silbo Sports",
            "url": "https://silbosports.com/",
            "potentialAction": {
              "@type": "SearchAction",
              "target": "https://silbosports.com/explore?q={search_term_string}",
              "query-input": "required name=search_term_string"
            }
          }
        ]
      }
    </script>
