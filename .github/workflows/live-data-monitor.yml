name: Live Data Monitor

on:
  schedule:
    - cron: '7,37 * * * *'
  workflow_dispatch:

jobs:
  verify-live-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify:live-data -- --strict
